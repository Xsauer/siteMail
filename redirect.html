<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ładowanie...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f6fb;
      font-family: Arial, Tahoma, Geneva, sans-serif;
    }
    .box {
      text-align: center;
      padding: 48px 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 100%;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #0382CE;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1rem; color: #334155; font-weight: 600; margin-bottom: 8px; }
    p  { font-size: 0.85rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>Trwa przetwarzanie...</h2>
    <p>Proszę czekać chwilę.</p>
  </div>

  <script>
    (async () => {
      // Читаем deal_id из URL: redirect.html?deal_id=4862
      const params = new URLSearchParams(window.location.search);
      const dealId = params.get('deal_id') || '';

      // Вебхук Bitrix24 — подставляем deal_id динамически
      const webhookBase = 'https://demo.bitrix24.pl/rest/134/k11111111111111/crm.deal.update.json';
      const webhookUrl  = `${webhookBase}?id=${dealId}&fields%5BSTAGE_ID%5D=C10%3AEXECUTING`;

      try {
        await fetch(webhookUrl);
      } catch (e) {
        console.error('Webhook error:', e);
      }

      // Редиректим на страницу-заглушку
      window.location.href = 'https://b24-bbgl2x.bitrix24.site/';
    })();
  </script>
</body>
</html>
